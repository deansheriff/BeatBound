version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: beatbound
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beatbound}
      POSTGRES_DB: beatbound
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beatbound-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatbound"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache & Leaderboard
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - beatbound-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://beatbound:${DB_PASSWORD:-beatbound}@postgres:5432/beatbound
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      CDN_URL: ${CDN_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - beatbound-network

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    networks:
      - beatbound-network

volumes:
  postgres_data:

networks:
  beatbound-network:
    driver: bridge
